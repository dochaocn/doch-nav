<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人导航站</title>
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar" role="banner">
        <div class="topbar__brand">
          <span class="topbar__logo" aria-hidden="true">◇</span>
          <div>
            <div class="topbar__title">个人导航站</div>
            <div class="topbar__greet" id="greet"></div>
          </div>
        </div>
        <div class="topbar__search-wrap">
          <label class="visually-hidden" for="filter-input">搜索</label>
          <input
            id="filter-input"
            class="topbar__search"
            type="search"
            placeholder="搜索标题、名称与链接…"
            autocomplete="off"
          />
        </div>
        <div class="topbar__actions">
          <button type="button" class="icon-btn" id="btn-theme" title="切换主题" aria-label="切换主题">
            <span class="theme-icon" id="theme-icon">☀</span>
          </button>
          <button type="button" class="icon-btn" id="btn-options" title="设置" aria-label="打开设置">⚙</button>
        </div>
      </header>

      <div class="sync-banner" id="sync-banner" hidden></div>

      <main class="layout-main">
        <div class="layout-col layout-col--left">
          <section class="panel panel--fill" aria-labelledby="pinned-heading">
            <div class="panel__head">
              <h2 class="panel__title" id="pinned-heading">常用链接</h2>
              <button type="button" class="btn btn--ghost btn--sm" id="btn-new-folder-pinned">
                ＋ 新建文件夹
              </button>
            </div>
            <form class="pinned-add-form" id="form-pinned-manual" autocomplete="off">
              <input
                type="url"
                name="url"
                required
                placeholder="https://…"
                aria-label="网址"
              />
              <input type="text" name="title" placeholder="标题（可选）" aria-label="标题" />
              <button type="submit" class="btn btn--primary btn--sm">添加</button>
            </form>
            <p class="panel__hint panel__hint--sm">
              磁贴可拖入「暂存」或下方「经常访问」；从这两处也可拖入本区文件夹。
            </p>
            <p class="panel__hint" id="pinned-empty" hidden>
              暂无常用链接。可在上方手动添加，或从右侧「经常访问」加入。
            </p>
            <div id="pinned-root" class="folder-stack"></div>
          </section>
        </div>

        <div class="layout-col layout-col--right">
          <section class="panel panel--stash" aria-labelledby="stash-heading">
            <div class="panel__head">
              <h2 class="panel__title" id="stash-heading">暂存</h2>
              <button type="button" class="btn btn--ghost btn--sm" id="btn-new-folder-stash">
                ＋ 新建文件夹
              </button>
            </div>
            <p class="panel__hint panel__hint--sm">
              条目可拖入左侧「常用」或下方「经常访问」；从这两处也可拖回本区。
            </p>
            <p class="panel__hint panel__hint--sm" id="stash-empty" hidden>
              暂无暂存。点击浏览器工具栏中的本扩展图标，可将当前网页一键加入暂存（默认文件夹）。
            </p>
            <div id="stash-root" class="folder-stack"></div>
          </section>

          <section class="panel panel--scroll panel--grow" aria-labelledby="freq-heading">
            <div class="panel__head">
              <h2 class="panel__title" id="freq-heading">经常访问</h2>
              <span class="panel__tag" id="freq-source-hint">本机数据 + 同步点击</span>
            </div>
            <p class="panel__hint panel__hint--sm">
              可与「常用」「暂存」拖拽互换：卡片拖入左/上为加入；从常用或暂存拖入本区为移除该条目。
            </p>
            <p class="panel__hint panel__hint--sm" id="freq-empty" hidden>暂时无法读取站点列表。</p>
            <div id="freq-root" class="folder-stack"></div>
          </section>
        </div>
      </main>

      <footer class="foot">
        <a href="options.html" target="_blank" rel="noopener">设置与同步说明</a>
      </footer>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
    <script type="module" src="newtab.js"></script>
  </body>
</html>
